apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-sample-app
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: sample-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - port: 80
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 443
