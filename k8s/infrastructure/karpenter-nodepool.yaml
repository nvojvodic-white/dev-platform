apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.medium", "t3.large", "m5.large", "m5a.large"]
      nodeClassRef:
        name: default
        apiVersion: karpenter.k8s.aws/v1beta1
  limits:
    cpu: 100
    memory: 400Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 168h # 7 Days

---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  role: "KarpenterNodeRole-dev-platform-dev"
  subnetSelectorTerms:
    - tags:
        kubernetes.io/cluster/dev-platform-dev: "owned"
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/dev-platform-dev: "owned"
